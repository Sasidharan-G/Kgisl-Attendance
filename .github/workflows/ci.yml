name: Pull request checks

on:
  pull_request:
    paths:
      - 'kgisl-attendance/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kgisl-attendance/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kgisl-attendance/backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kgisl-attendance/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kgisl-attendance/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
