services:
  - type: web
    name: kgisl-attendance-app
    env: docker
    rootDir: kgisl-attendance
    plan: free
    region: singapore
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kgisl-attendance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kgisl-attendance-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: QR_HMAC_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        value: "https://kgisl-attendance-1.onrender.com"
      - key: NODE_ENV
        value: production
      - key: EMAIL_FROM
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: PASSWORD_RESET_TTL_SECONDS
        value: "600"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: "25mca95@kgisliim.ac.in"
      - key: SMTP_PASS
        sync: false

  - type: redis
    name: kgisl-attendance-redis
    plan: free
    region: singapore
    ipAllowList: []

databases:
  - name: kgisl-attendance-db
    databaseName: kgisl_attendance
    user: kgisl
    plan: free
    region: singapore
