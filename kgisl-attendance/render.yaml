services:
  - type: web
    name: kgisl-attendance-app
    env: docker
    rootDir: kgisl-attendance
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kgisl-attendance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kgisl-attendance-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: QR_HMAC_SECRET
        value: "a3f8c2d1e4b7906f5a2c8d3e1b4f7a0c9d2e5b8f1a4c7d0e3b6f9a2c5d8e1b4f"
      - key: FRONTEND_ORIGINS
        value: "https://kgisl-attendance-app.onrender.com"
      - key: NODE_ENV
        value: production

  - type: redis
    name: kgisl-attendance-redis
    plan: free
    region: singapore
    ipAllowList: []

databases:
  - name: kgisl-attendance-db
    databaseName: kgisl_attendance
    user: kgisl
    plan: free
    region: singapore
